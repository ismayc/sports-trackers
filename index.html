<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Sports Trackers — which of your sports have games today</title>
    <meta
      name="description"
      content="A family home page for Chester Ismay's sports viewers: which of NBA, NFL, WNBA, Premier League, World Cup, and March Madness have games today, with deep links into each. No backend, no tracking."
    />
    <meta name="theme-color" content="#12151c" />
    <link rel="canonical" href="https://ismayc.github.io/sports-trackers/" />

    <link rel="icon" type="image/svg+xml" href="./icon.svg" />
    <link rel="apple-touch-icon" href="./apple-touch-icon.png" />
    <link rel="manifest" href="./manifest.webmanifest" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Sports Trackers" />

    <!-- Open Graph (link previews in Slack/Discord/iMessage/Facebook) -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Sports Trackers" />
    <meta property="og:title" content="Sports Trackers — which of your sports have games today" />
    <meta
      property="og:description"
      content="One home page for the whole sports viewer family: who's playing today, live scores, and deep links into each viewer."
    />
    <meta property="og:url" content="https://ismayc.github.io/sports-trackers/" />
    <meta property="og:image" content="https://ismayc.github.io/sports-trackers/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Sports Trackers" />

    <!-- Twitter card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Sports Trackers — which of your sports have games today" />
    <meta
      name="twitter:description"
      content="One home page for the whole sports viewer family: who's playing today, live scores, and deep links into each viewer."
    />
    <meta name="twitter:image" content="https://ismayc.github.io/sports-trackers/og-image.png" />

    <script>
      // Resolve the theme before first paint so there is no flash of the wrong one.
      // System preference by default; an explicit choice wins and persists (key st:theme).
      ;(function () {
        try {
          var t = localStorage.getItem('st:theme')
          if (!t) t = window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark'
          document.documentElement.dataset.theme = t
        } catch (e) {
          document.documentElement.dataset.theme = 'dark'
        }
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
