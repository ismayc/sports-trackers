name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

# A push that lands while a deploy is running should supersede it, not queue behind it —
# but never cancel a deploy midway.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - uses: actions/upload-pages-artifact@v5
        with:
          path: dist

  # Deploys only from main, and only after the build succeeds. There are no tests to gate
  # on here (the hub is a thin client over live feeds), and no Netlify/coverage — just
  # build + GitHub Pages, per the simplified brief.
  deploy:
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - id: deploy
        uses: actions/deploy-pages@v5
